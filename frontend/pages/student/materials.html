<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.1/feather.min.js"></script>

    try {
      if (localStorage.getItem('ev_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme','dark');
        document.documentElement.classList.add('dark');
      }
    } catch(e) {}
  </script>
  <style>
    /* ── Filters bar ── */
    .filters-bar {
      display: flex; align-items: center; gap: var(--space-3);
      flex-wrap: wrap; margin-bottom: var(--space-6);
      padding: var(--space-4); background: var(--bg-surface);
      border: var(--card-border); border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
    }
    .filter-select {
      height: 36px; padding: 0 var(--space-3);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      font-size: var(--font-size-sm); color: var(--text-primary);
      background: var(--bg-page); cursor: pointer; outline: none;
      font-family: var(--font-ui);
    }
    .filter-select:focus { border-color: var(--color-primary-600); }
    .search-wrap {
      flex: 1; min-width: 200px; position: relative;
    }
    .search-wrap input {
      width: 100%; height: 36px;
      padding: 0 var(--space-4) 0 var(--space-9);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      font-size: var(--font-size-sm); color: var(--text-primary);
      background: var(--bg-page); outline: none; font-family: var(--font-ui);
    }
    .search-wrap input:focus { border-color: var(--color-primary-600); }
    .search-wrap .search-icon {
      position: absolute; left: var(--space-3); top: 50%;
      transform: translateY(-50%); color: var(--text-muted);
      pointer-events: none;
    }

    /* ── Materials grid ── */
    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-5);
    }

    /* ── Material card ── */
    .material-card {
      background: var(--bg-surface); border: var(--card-border);
      border-radius: var(--card-radius); box-shadow: var(--card-shadow);
      overflow: hidden; transition: all var(--transition-base);
      display: flex; flex-direction: column;
    }
    .material-card:hover {
      box-shadow: var(--shadow-md); transform: translateY(-2px);
    }
    .material-card-thumb {
      height: 120px; display: flex; align-items: center;
      justify-content: center; font-size: 3rem;
      position: relative;
    }
    .material-type-badge {
      position: absolute; top: var(--space-2); right: var(--space-2);
      padding: 2px 8px; border-radius: 99px;
      font-size: 10px; font-weight: var(--font-weight-bold);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .type-notes       { background: #dbeafe; color: #1e40af; }
    .type-question    { background: #fef3c7; color: #92400e; }
    .type-guide       { background: #d1fae5; color: #065f46; }
    .type-assignment  { background: #ede9fe; color: #5b21b6; }
    .type-other       { background: var(--neutral-100); color: var(--text-muted); }

    .material-card-body {
      padding: var(--space-4); flex: 1; display: flex; flex-direction: column;
    }
    .material-card-subject {
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      text-transform: uppercase; letter-spacing: var(--tracking-wider);
      color: var(--color-primary-600); margin-bottom: var(--space-1);
    }
    .material-card-title {
      font-size: var(--font-size-base); font-weight: var(--font-weight-semibold);
      color: var(--text-primary); margin-bottom: var(--space-2);
      line-height: var(--leading-snug);
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .material-card-instructor {
      font-size: var(--font-size-xs); color: var(--text-muted);
      margin-bottom: var(--space-3);
    }
    .material-card-meta {
      display: flex; align-items: center; gap: var(--space-3);
      font-size: var(--font-size-xs); color: var(--text-muted);
      margin-bottom: var(--space-3);
    }
    .material-card-meta span {
      display: flex; align-items: center; gap: 3px;
    }
    .material-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: var(--space-3);
      border-top: 1px solid var(--border-color); margin-top: auto;
    }
    .material-price {
      font-size: var(--font-size-lg); font-weight: var(--font-weight-extrabold);
      color: var(--text-primary);
    }
    .material-price-free { color: var(--color-success); }
    .material-rating {
      display: flex; align-items: center; gap: 3px;
      font-size: var(--font-size-xs); color: var(--color-accent-500);
      font-weight: var(--font-weight-semibold);
    }

    /* ── Tabs ── */
    .page-tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: var(--space-6);
    }
    .page-tab {
      padding: var(--space-3) var(--space-5);
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -2px; cursor: pointer; transition: all var(--transition-fast);
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: var(--font-ui);
    }
    .page-tab:hover { color: var(--text-primary); }
    .page-tab.active {
      color: var(--color-primary-600);
      border-bottom-color: var(--color-primary-600);
      font-weight: var(--font-weight-semibold);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── My purchases ── */
    .purchase-item {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4); background: var(--bg-surface);
      border: var(--card-border); border-radius: var(--card-radius);
      box-shadow: var(--card-shadow); margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }
    .purchase-item:hover { box-shadow: var(--shadow-md); }
    .purchase-icon {
      width: 52px; height: 52px; border-radius: var(--border-radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .purchase-info { flex: 1; min-width: 0; }
    .purchase-title {
      font-size: var(--font-size-base); font-weight: var(--font-weight-semibold);
      color: var(--text-primary); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .purchase-meta {
      font-size: var(--font-size-xs); color: var(--text-muted);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: var(--bg-overlay);
      z-index: var(--z-modal); display: none;
      align-items: center; justify-content: center; padding: var(--space-4);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-elevated); border-radius: var(--border-radius-xl);
      box-shadow: var(--shadow-modal); width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-color);
    }
    .modal-title { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--text-primary); }
    .modal-body  { padding: var(--space-6); }
    .modal-footer {
      display: flex; align-items: center; justify-content: flex-end;
      gap: var(--space-3); padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--border-color);
      background: var(--neutral-50); border-radius: 0 0 var(--border-radius-xl) var(--border-radius-xl);
    }

    /* ── Skeleton ── */
    .skel {
      background: var(--neutral-100); border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Empty state ── */
    .empty-box {
      text-align: center; padding: var(--space-16) var(--space-8);
    }
    .empty-box-icon { font-size: 3rem; margin-bottom: var(--space-4); }
    .empty-box-title {
      font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold);
      color: var(--text-primary); margin-bottom: var(--space-2);
    }
    .empty-box-text { font-size: var(--font-size-sm); color: var(--text-muted); }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: var(--space-2); margin-top: var(--space-8);
    }
    .page-btn {
      width: 36px; height: 36px; border-radius: var(--border-radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      border: 1px solid var(--border-color); background: var(--bg-surface);
      color: var(--text-secondary); cursor: pointer;
      transition: all var(--transition-fast); font-family: var(--font-ui);
    }
    .page-btn:hover { background: var(--neutral-50); color: var(--text-primary); }
    .page-btn.active {
      background: var(--color-primary-600); border-color: var(--color-primary-600);
      color: #fff;
    }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    @media (max-width: 767px) {
      .materials-grid { grid-template-columns: 1fr; }
      .filters-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

          <div class="pagination" id="pagination"></div>

        </div>

        <!-- MY LIBRARY TAB -->
        <div class="tab-panel" id="tab-purchased">
          <div id="purchases-list">
            <div class="skel" style="height:80px;border-radius:12px;margin-bottom:12px;"></div>
            <div class="skel" style="height:80px;border-radius:12px;margin-bottom:12px;"></div>
            <div class="skel" style="height:80px;border-radius:12px;"></div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Material Detail Modal -->
<div class="modal-overlay" id="material-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Material Details</div>
      <button class="btn btn-ghost btn-icon btn-sm" id="modal-close">
        <i data-feather="x"></i>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Foundation JS -->
<script>window.EV_BASE = "../../";</script>
<script src="../../js/utils.js"></script>
<script src="../../js/sidebar.js"></script>  <!-- FIX 22: was missing -->
<script src="../../js/store.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/router.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/init.js"></script>

<!-- Auth guard -->
<script>
(function() {
  var token, user;
  try {
    token = localStorage.getItem('ev_token');
    user  = token ? JSON.parse(localStorage.getItem('ev_user')) : null;
  } catch(e) {}
  if (!token || !user) window.location.replace('../../pages/auth/login.html');
  else if (user.role !== 'student') window.location.replace('../../pages/errors/403.html');
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof feather !== 'undefined') feather.replace({ 'stroke-width': 1.75 });

  // ── User info ──
  var user = Store.get('auth.user');
  if (user) {
    var initials = Utils.getInitials(user.name);
    var color    = Utils.getAvatarColor(user.name);
    ['sidebar-avatar','navbar-avatar'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) { el.textContent = initials; el.className = 'avatar avatar-sm ' + color; }
    });
    ['sidebar-user-name','navbar-user-name','dd-user-name'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = user.name;
    });
  }

  // ── Sidebar + theme + logout wiring ──
  var shell   = document.getElementById('app-shell');
  var menuBtn = document.getElementById('navbar-menu-btn');
  var overlay = document.getElementById('sidebar-overlay');
  var colBtn  = document.getElementById('sidebar-collapse-btn');

  try {
    if (localStorage.getItem('ev_sidebar_collapsed') === 'true') shell.classList.add('sidebar-collapsed');
    else shell.classList.remove('sidebar-collapsed');
  } catch(e) {}
  colBtn  && colBtn.addEventListener('click', function() {
    var c = shell.classList.toggle('sidebar-collapsed');
    try { localStorage.setItem('ev_sidebar_collapsed', String(c)); } catch(e) {}
  });
  menuBtn && menuBtn.addEventListener('click', function() { shell.classList.toggle('sidebar-open'); });
  overlay && overlay.addEventListener('click', function() { shell.classList.remove('sidebar-open'); });

  document.querySelectorAll('[data-action="toggle-theme"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var d = document.documentElement.classList.toggle('dark');
      document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      try { localStorage.setItem('ev_theme', d ? 'dark' : 'light'); } catch(e) {}
    });
  });

  document.querySelectorAll('[data-action="logout"]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      if (typeof Auth !== 'undefined') Auth.logout();
    });
  });

  // Dropdown
  var trigger  = document.getElementById('navbar-user-trigger');
  var dropdown = document.getElementById('user-dropdown');
  if (trigger && dropdown) {
    trigger.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.hidden = !dropdown.hidden;
    });
    document.addEventListener('click', function() { if (dropdown) dropdown.hidden = true; });
  }

  // ── Tabs ──
  var tabs   = document.querySelectorAll('.page-tab');
  var panels = document.querySelectorAll('.tab-panel');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t)   { t.classList.remove('active'); });
      panels.forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      var panelId = 'tab-' + tab.getAttribute('data-tab');
      var panel   = document.getElementById(panelId);
      if (panel) panel.classList.add('active');
      if (tab.getAttribute('data-tab') === 'purchased') loadPurchases();
    });
  });

  // ── State ──
  var currentPage     = 1;
  var currentFilters  = {};
  var selectedMaterial = null;

  // ── Type config ──
  var typeConfig = {
    notes:        { emoji: '📝', label: 'Notes',          bg: '#dbeafe', badge: 'type-notes'      },
    question_paper:{ emoji: '📋', label: 'Question Paper', bg: '#fef3c7', badge: 'type-question'   },
    study_guide:  { emoji: '📖', label: 'Study Guide',    bg: '#d1fae5', badge: 'type-guide'      },
    assignment:   { emoji: '✏️',  label: 'Assignment',     bg: '#ede9fe', badge: 'type-assignment' },
    other:        { emoji: '📄', label: 'Other',          bg: '#f3f4f6', badge: 'type-other'      },
  };

  // ── Load materials ──
  async function loadMaterials(page) {
    page = page || 1;
    currentPage = page;

    var params = {
      page:    page,
      limit:   12,
      search:  document.getElementById('search-input').value.trim()   || undefined,
      type:    document.getElementById('filter-type').value           || undefined,
      level:   document.getElementById('filter-level').value          || undefined,
      is_free: document.getElementById('filter-price').value          || undefined,
      sort:    document.getElementById('filter-sort').value           || undefined,
    };

    // Remove undefined
    Object.keys(params).forEach(function(k) {
      if (params[k] === undefined) delete params[k];
    });

    currentFilters = params;

    try {
      var res  = await Api.get('/materials', params);
      var data = res && res.data;
      if (!data) return;
      renderMaterials(data.materials || []);
      renderPagination(data.pagination);
      var info = document.getElementById('results-info');
      if (info) {
        info.textContent = data.pagination.total + ' material' +
          (data.pagination.total !== 1 ? 's' : '') + ' found';
      }
    } catch (err) {
      var grid = document.getElementById('materials-grid');
      if (grid) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;' +
        'padding:var(--space-12);color:var(--color-danger);">' +
        '⚠️ Failed to load materials. Please try again.</div>';
    }
  }

  // ── Render materials ──
  function renderMaterials(materials) {
    var grid = document.getElementById('materials-grid');
    if (!grid) return;

    if (!materials.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;">' +
        '<div class="empty-box">' +
        '<div class="empty-box-icon">📚</div>' +
        '<div class="empty-box-title">No materials found</div>' +
        '<div class="empty-box-text">Try adjusting your filters or search term.</div>' +
        '</div></div>';
      return;
    }

    grid.innerHTML = materials.map(function(m) {
      var tc    = typeConfig[m.type] || typeConfig.other;
      var price = m.is_free || m.price === 0
        ? '<span class="material-price material-price-free">FREE</span>'
        : '<span class="material-price">₹' + parseFloat(m.price).toFixed(0) + '</span>';
      var rating = m.avg_rating
        ? '<div class="material-rating">★ ' +
          parseFloat(m.avg_rating).toFixed(1) +
          ' <span style="color:var(--text-muted);font-weight:400;">(' + m.total_ratings + ')</span></div>'
        : '<div style="font-size:var(--font-size-xs);color:var(--text-muted);">No ratings yet</div>';
      var pages = m.pages ? m.pages + ' pages · ' : '';
      var lang  = m.language || 'English';
      var level = m.level ? Utils.getLevelLabel(m.level) + ' · ' : '';

      return '<div class="material-card" data-id="' + m.id + '" style="cursor:pointer;">' +
        '<div class="material-card-thumb" style="background:' + tc.bg + ';">' +
          '<span style="font-size:3rem;">' + tc.emoji + '</span>' +
          '<span class="material-type-badge ' + tc.badge + '">' + tc.label + '</span>' +
        '</div>' +
        '<div class="material-card-body">' +
          '<div class="material-card-subject">' +
            Utils.escapeHtml(m.subject || m.category || 'General') +
          '</div>' +
          '<div class="material-card-title">' + Utils.escapeHtml(m.title) + '</div>' +
          '<div class="material-card-instructor">By ' +
            Utils.escapeHtml(m.instructor_name || 'Instructor') +
          '</div>' +
          '<div class="material-card-meta">' +
            '<span>' + level + lang + '</span>' +
            (m.pages ? '<span>· ' + m.pages + ' pages</span>' : '') +
            '<span>· ' + (m.purchase_count || 0) + ' purchased</span>' +
          '</div>' +
          '<div class="material-card-footer">' +
            price +
            rating +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    // Wire card clicks
    grid.querySelectorAll('.material-card').forEach(function(card) {
      card.addEventListener('click', function() {
        openMaterialModal(card.getAttribute('data-id'));
      });
    });
  }

  // ── Render pagination ──
  function renderPagination(pagination) {
    var container = document.getElementById('pagination');
    if (!container || !pagination) return;
    if (pagination.total_pages <= 1) { container.innerHTML = ''; return; }

    var html = '';
    html += '<button class="page-btn" ' +
      (pagination.page <= 1 ? 'disabled' : '') +
      ' data-page="' + (pagination.page - 1) + '">‹</button>';

    for (var i = 1; i <= pagination.total_pages; i++) {
      if (i === 1 || i === pagination.total_pages ||
          (i >= pagination.page - 1 && i <= pagination.page + 1)) {
        html += '<button class="page-btn ' + (i === pagination.page ? 'active' : '') +
          '" data-page="' + i + '">' + i + '</button>';
      } else if (i === 2 || i === pagination.total_pages - 1) {
        html += '<span style="color:var(--text-muted);padding:0 4px;">…</span>';
      }
    }

    html += '<button class="page-btn" ' +
      (pagination.page >= pagination.total_pages ? 'disabled' : '') +
      ' data-page="' + (pagination.page + 1) + '">›</button>';

    container.innerHTML = html;
    container.querySelectorAll('.page-btn:not([disabled])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        loadMaterials(parseInt(btn.getAttribute('data-page')));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // ── Open material modal ──
  async function openMaterialModal(id) {
    var modal = document.getElementById('material-modal');
    var body  = document.getElementById('modal-body');
    var footer= document.getElementById('modal-footer');
    var title = document.getElementById('modal-title');

    if (!modal) return;
    body.innerHTML  = '<div style="text-align:center;padding:var(--space-8);">' +
      '<div class="spinner"></div></div>';
    footer.innerHTML = '';
    modal.classList.add('open');

    try {
      var res  = await Api.get('/materials/' + id);
      var m    = res && res.data;
      if (!m) return;

      selectedMaterial = m;
      var tc = typeConfig[m.type] || typeConfig.other;
      title.textContent = m.title;

      body.innerHTML =
        '<div style="display:flex;gap:var(--space-4);margin-bottom:var(--space-5);">' +
          '<div style="width:64px;height:64px;border-radius:var(--border-radius-lg);' +
            'background:' + tc.bg + ';display:flex;align-items:center;justify-content:center;' +
            'font-size:1.8rem;flex-shrink:0;">' + tc.emoji + '</div>' +
          '<div>' +
            '<div style="font-size:var(--font-size-xs);font-weight:700;' +
              'color:var(--color-primary-600);text-transform:uppercase;' +
              'letter-spacing:.06em;margin-bottom:3px;">' +
              Utils.escapeHtml(m.subject || m.category || '') + '</div>' +
            '<div style="font-size:var(--font-size-base);font-weight:700;' +
              'color:var(--text-primary);margin-bottom:3px;">' +
              Utils.escapeHtml(m.title) + '</div>' +
            '<div style="font-size:var(--font-size-sm);color:var(--text-muted);">' +
              'By ' + Utils.escapeHtml(m.instructor_name) + '</div>' +
          '</div>' +
        '</div>' +
        (m.description
          ? '<p style="font-size:var(--font-size-sm);color:var(--text-secondary);' +
            'line-height:var(--leading-relaxed);margin-bottom:var(--space-5);">' +
            Utils.escapeHtml(m.description) + '</p>'
          : '') +
        '<div style="display:grid;grid-template-columns:1fr 1fr;' +
          'gap:var(--space-3);margin-bottom:var(--space-5);">' +
          _detailRow('📄 Type',     tc.label) +
          _detailRow('🎓 Level',    m.level ? Utils.getLevelLabel(m.level) : '—') +
          _detailRow('🌐 Language', m.language || 'English') +
          _detailRow('📃 Pages',    m.pages ? m.pages + ' pages' : '—') +
          _detailRow('⬇️ Downloads', m.download_count || 0) +
          _detailRow('👥 Purchased', m.purchase_count || 0) +
        '</div>' +
        (m.tags
          ? '<div style="margin-bottom:var(--space-5);">' +
            '<div style="font-size:var(--font-size-xs);font-weight:600;' +
              'color:var(--text-muted);margin-bottom:var(--space-2);">TAGS</div>' +
            '<div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">' +
            m.tags.split(',').map(function(tag) {
              return '<span style="padding:2px 10px;background:var(--neutral-100);' +
                'border-radius:99px;font-size:var(--font-size-xs);' +
                'color:var(--text-secondary);">' + Utils.escapeHtml(tag.trim()) + '</span>';
            }).join('') +
            '</div></div>'
          : '') +
        (m.avg_rating
          ? '<div style="display:flex;align-items:center;gap:var(--space-2);' +
            'margin-bottom:var(--space-5);">' +
            '<span style="font-size:1.2rem;color:#f59e0b;">★</span>' +
            '<span style="font-size:var(--font-size-lg);font-weight:800;">' +
              parseFloat(m.avg_rating).toFixed(1) + '</span>' +
            '<span style="font-size:var(--font-size-sm);color:var(--text-muted);">' +
              '(' + m.total_ratings + ' rating' + (m.total_ratings !== 1 ? 's' : '') + ')</span>' +
          '</div>'
          : '');

      // Footer buttons
      var priceLabel = m.is_free || m.price === 0
        ? 'Get Free'
        : 'Buy for ₹' + parseFloat(m.price).toFixed(0);

      if (m.purchased) {
        footer.innerHTML =
          '<button class="btn btn-outline btn-lg" id="modal-cancel">Close</button>' +
          '<button class="btn btn-success btn-lg" id="modal-download">' +
            '<i data-feather="download" style="width:16px;height:16px;"></i>' +
            ' Download Now' +
          '</button>';
        document.getElementById('modal-download').addEventListener('click', function() {
          downloadMaterial(m.id, m.title);
        });
      } else {
        footer.innerHTML =
          '<button class="btn btn-outline btn-lg" id="modal-cancel">Cancel</button>' +
          '<button class="btn btn-primary btn-lg" id="modal-buy">' +
            (m.is_free || m.price === 0
              ? '<i data-feather="plus-circle" style="width:16px;height:16px;"></i> ' + priceLabel
              : '<i data-feather="shopping-cart" style="width:16px;height:16px;"></i> ' + priceLabel) +
          '</button>';
        document.getElementById('modal-buy').addEventListener('click', function() {
          buyMaterial(m);
        });
      }

      document.getElementById('modal-cancel') &&
        document.getElementById('modal-cancel').addEventListener('click', closeModal);

      if (typeof feather !== 'undefined') feather.replace({ 'stroke-width': 1.75 });

    } catch (err) {
      body.innerHTML = '<div style="color:var(--color-danger);text-align:center;' +
        'padding:var(--space-8);">Failed to load material details.</div>';
    }
  }

  function _detailRow(label, value) {
    return '<div style="background:var(--bg-sunken);border-radius:var(--border-radius-md);' +
      'padding:var(--space-3) var(--space-4);">' +
      '<div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;">' + label + '</div>' +
      '<div style="font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);">' +
        value + '</div>' +
    '</div>';
  }

  // ── Buy material ──
  async function buyMaterial(material) {
    var buyBtn = document.getElementById('modal-buy');
    if (buyBtn) {
      buyBtn.disabled    = true;
      buyBtn.textContent = 'Processing…';
    }

    try {
      var res = await Api.post('/materials/' + material.id + '/purchase');
      var data = res && res.data;

      if (data && data.free) {
        // Free material — show success
        showToast('success', 'Added to Library!',
          '"' + material.title + '" is now in your library.');
        closeModal();
        loadPurchases();
        updatePurchaseBadge();
      } else if (data && data.requires_payment) {
        // Paid — show payment message for now
        showToast('info', 'Payment Required',
          'Payment gateway integration coming soon. Price: ₹' +
          parseFloat(material.price).toFixed(0));
        if (buyBtn) {
          buyBtn.disabled    = false;
          buyBtn.textContent = 'Buy for ₹' + parseFloat(material.price).toFixed(0);
        }
      }
    } catch (err) {
      var msg = err && err.message || 'Purchase failed. Please try again.';
      showToast('error', 'Error', msg);
      if (buyBtn) {
        buyBtn.disabled    = false;
        buyBtn.textContent = 'Try Again';
      }
    }
  }

  // ── Download material ──
  async function downloadMaterial(id, title) {
    try {
      var res  = await Api.get('/materials/' + id + '/download');
      var data = res && res.data;
      if (data && data.download_url) {
        // Create a temporary link and trigger download
        var a       = document.createElement('a');
        a.href      = data.download_url;
        a.download  = data.file_name || title + '.pdf';
        a.target    = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast('success', 'Download Started', 'Your file is downloading.');
      }
    } catch (err) {
      showToast('error', 'Download Failed',
        err && err.message || 'Could not download the file.');
    }
  }

  // ── Load purchases ──
  async function loadPurchases() {
    var list = document.getElementById('purchases-list');
    if (!list) return;

    list.innerHTML = '<div class="skel" style="height:80px;border-radius:12px;' +
      'margin-bottom:12px;"></div>'.repeat(3);

    try {
      var res   = await Api.get('/materials/my/purchases');
      var items = (res && res.data) || [];

      updatePurchaseBadge(items.length);

      if (!items.length) {
        list.innerHTML = '<div class="empty-box">' +
          '<div class="empty-box-icon">📚</div>' +
          '<div class="empty-box-title">Your library is empty</div>' +
          '<div class="empty-box-text">Purchase study materials to access them here.</div>' +
          '</div>';
        return;
      }

      list.innerHTML = items.map(function(item) {
        var tc = typeConfig[item.type] || typeConfig.other;
        var size = item.file_size
          ? Utils.formatBytes(item.file_size) : '';
        return '<div class="purchase-item">' +
          '<div class="purchase-icon" style="background:' + tc.bg + ';">' +
            tc.emoji +
          '</div>' +
          '<div class="purchase-info">' +
            '<div class="purchase-title">' + Utils.escapeHtml(item.title) + '</div>' +
            '<div class="purchase-meta">' +
              'By ' + Utils.escapeHtml(item.instructor_name) +
              (item.subject ? ' · ' + Utils.escapeHtml(item.subject) : '') +
              (size ? ' · ' + size : '') +
              ' · Purchased ' + Utils.timeAgo(item.purchased_at) +
            '</div>' +
          '</div>' +
          '<button class="btn btn-primary btn-sm" ' +
            'onclick="downloadMaterialFromList(' + item.id + ', \'' +
            item.title.replace(/'/g, "\\'") + '\')">' +
            '<i data-feather="download" style="width:14px;height:14px;"></i>' +
            ' Download' +
          '</button>' +
        '</div>';
      }).join('');

      if (typeof feather !== 'undefined') feather.replace({ 'stroke-width': 1.75 });

    } catch (err) {
      list.innerHTML = '<div style="color:var(--color-danger);text-align:center;' +
        'padding:var(--space-8);">Failed to load your library.</div>';
    }
  }

  // ── Update purchase badge ──
  function updatePurchaseBadge(count) {
    var badge = document.getElementById('purchase-count-badge');
    if (!badge) return;
    if (count > 0) {
      badge.textContent   = count;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }

  // ── Close modal ──
  function closeModal() {
    var modal = document.getElementById('material-modal');
    if (modal) modal.classList.remove('open');
    selectedMaterial = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('material-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Toast ──
  function showToast(type, title, message) {
    var container = document.querySelector('.toast-container');
    if (!container) return;
    var id = 'toast-' + Date.now();
    var el = document.createElement('div');
    el.id        = id;
    el.className = 'toast toast-' + type;
    el.innerHTML =
      '<div class="toast-content">' +
        '<div class="toast-title">'   + Utils.escapeHtml(title)   + '</div>' +
        '<div class="toast-message">' + Utils.escapeHtml(message) + '</div>' +
      '</div>' +
      '<button class="toast-close" onclick="this.closest(\'.toast\').remove()">✕</button>';
    container.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 4000);
  }

  // ── Filters ──
  var debounceTimer;
  document.getElementById('search-input').addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { loadMaterials(1); }, 400);
  });

  ['filter-type','filter-level','filter-price','filter-sort'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', function() {
      loadMaterials(1);
    });
  });

  // ── Global download function for library tab ──
  window.downloadMaterialFromList = function(id, title) {
    downloadMaterial(id, title);
  };

  // ── Initial load ──
  loadMaterials(1);
});
</script>

</body>
