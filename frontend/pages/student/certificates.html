<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates — EduVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.1/feather.min.js"></script>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/reset.css" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <script>try{if(localStorage.getItem('ev_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.classList.add('dark');}}catch(e){}</script>
  <style>
    .cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--space-5);}
    .cert-card{background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);overflow:hidden;transition:all var(--transition-base);}
    .cert-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .cert-banner{height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .cert-banner-inner{text-align:center;position:relative;z-index:1;}
    .cert-icon{font-size:3rem;line-height:1;}
    .cert-body{padding:var(--space-5);}
    .cert-title{font-size:var(--font-size-base);font-weight:700;color:var(--text-primary);margin-bottom:var(--space-1);}
    .cert-course{font-size:var(--font-size-xs);color:var(--text-muted);margin-bottom:var(--space-3);}
    .cert-meta{display:flex;align-items:center;justify-content:space-between;padding-top:var(--space-3);border-top:1px solid var(--border-color);}
    .cert-date{font-size:var(--font-size-xs);color:var(--text-muted);}
    .cert-id{font-size:10px;font-family:var(--font-mono);color:var(--text-disabled);margin-top:2px;}
    .skel{background:var(--neutral-100);border-radius:4px;animation:shimmer 1.5s infinite;}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
    .empty-box{text-align:center;padding:var(--space-16);color:var(--text-muted);}
    .empty-box-icon{font-size:4rem;margin-bottom:var(--space-4);}
    .empty-box-title{font-size:var(--font-size-xl);font-weight:700;color:var(--text-primary);margin-bottom:var(--space-2);}
    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--space-3);max-width:360px;}
    .toast{background:var(--bg-elevated);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--shadow-lg);padding:var(--space-4);display:flex;align-items:flex-start;gap:var(--space-3);}
    .toast-success{border-left:4px solid var(--color-success);}
    .toast-content{flex:1;}.toast-title{font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);}
    .toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);}
  </style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <aside class="app-sidebar" id="app-sidebar">
    <a class="sidebar-brand" href="../../index.html"><div class="sidebar-logo">E</div><div><div class="sidebar-brand-name">EduVerse</div><div class="sidebar-brand-tagline">Student Portal</div></div></a>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon"><i data-feather="grid"></i></span><span class="sidebar-item-label">Dashboard</span></a>
      <a class="sidebar-item" href="courses.html"><span class="sidebar-item-icon"><i data-feather="book-open"></i></span><span class="sidebar-item-label">My Courses</span></a>
      <a class="sidebar-item" href="assignments.html"><span class="sidebar-item-icon"><i data-feather="clipboard"></i></span><span class="sidebar-item-label">Assignments</span></a>
      <a class="sidebar-item" href="performance.html"><span class="sidebar-item-icon"><i data-feather="trending-up"></i></span><span class="sidebar-item-label">Performance</span></a>
      <a class="sidebar-item" href="materials.html"><span class="sidebar-item-icon"><i data-feather="file-text"></i></span><span class="sidebar-item-label">Study Materials</span></a>
      <a class="sidebar-item" href="calendar.html"><span class="sidebar-item-icon"><i data-feather="calendar"></i></span><span class="sidebar-item-label">Calendar</span></a>
      <a class="sidebar-item" href="messages.html"><span class="sidebar-item-icon"><i data-feather="message-circle"></i></span><span class="sidebar-item-label">Messages</span></a>
      <a class="sidebar-item active" href="certificates.html"><span class="sidebar-item-icon"><i data-feather="award"></i></span><span class="sidebar-item-label">Certificates</span></a>
      <div class="sidebar-divider"></div>
      <a class="sidebar-item" href="profile.html"><span class="sidebar-item-icon"><i data-feather="user"></i></span><span class="sidebar-item-label">Profile</span></a>
    </nav>
    <div class="sidebar-user"><div class="avatar avatar-sm" id="sidebar-avatar"></div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Loading…</div><div class="sidebar-user-role">Student</div></div></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-body">
    <header class="app-navbar">
      <div class="navbar-left">
        <button class="navbar-menu-btn" id="navbar-menu-btn"><i data-feather="menu"></i></button>
        <button class="btn-icon btn-ghost" id="sidebar-collapse-btn"><i data-feather="sidebar"></i></button>
      </div>
      <div class="navbar-right">
        <button class="btn-icon btn-ghost" data-action="toggle-theme"><i data-feather="sun"></i></button>
        <div class="navbar-user" id="navbar-user-trigger" style="cursor:pointer;"><div class="avatar avatar-sm" id="navbar-avatar"></div><span class="navbar-user-name" id="navbar-user-name"></span></div>
        <div class="dropdown" id="user-dropdown" hidden>
          <div class="dropdown-header"><div class="dropdown-user-name" id="dd-user-name"></div><div class="dropdown-user-role">Student</div></div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-item-danger" data-action="logout"><i data-feather="log-out"></i> Sign Out</button>
        </div>
      </div>
    </header>
    <main class="app-main">
      <div class="page-content">
        <div class="page-header" style="margin-bottom:var(--space-6);">
          <div><h1 class="page-title">My Certificates</h1><p class="page-subtitle">Download and share your earned certificates</p></div>
        </div>
        <div class="cert-grid" id="cert-grid">
          <div class="skel" style="height:220px;border-radius:12px;"></div>
          <div class="skel" style="height:220px;border-radius:12px;"></div>
          <div class="skel" style="height:220px;border-radius:12px;"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
<script>
  window.EV_BASE='../../';
  window.EV_API_BASE=window.EV_API_BASE||'http://localhost:5000/api/v1';
</script>
<script src="../../js/utils.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/store.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/router.js"></script>
<script src="../../js/init.js"></script>
<script>
(function(){var t,u;try{t=localStorage.getItem('ev_token');u=t?JSON.parse(localStorage.getItem('ev_user')):null;}catch(e){}if(!t||!u){window.location.replace('../../pages/auth/login.html');return;}if(u.role!=='student'){window.location.replace('../../pages/errors/403.html');}})();
document.addEventListener('DOMContentLoaded',function(){
  if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});
  var user;try{user=JSON.parse(localStorage.getItem('ev_user'))||{};}catch(e){user={};}
  var name=user.name||user.full_name||'Student';  // FIX 1: was undefined, crashed _esc(name)
  Sidebar.renderUser(user);
  // ── Sidebar (managed by sidebar.js) ──
  Sidebar.init();
  document.querySelectorAll('[data-action="toggle-theme"]').forEach(function(btn){btn.addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');document.documentElement.setAttribute('data-theme',d?'dark':'light');});});
  Sidebar.initDropdown();
  document.querySelectorAll('[data-action="logout"]').forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();if(typeof Auth!=='undefined')Auth.logout();else{try{localStorage.removeItem('ev_token');localStorage.removeItem('ev_user');}catch(e){}window.location.replace('../../pages/auth/login.html');}});});

  var bannerColors=[
    'linear-gradient(135deg,#1e3a8a,#1A56DB)',
    'linear-gradient(135deg,#065f46,#10b981)',
    'linear-gradient(135deg,#4c1d95,#7c3aed)',
    'linear-gradient(135deg,#92400e,#f59e0b)',
    'linear-gradient(135deg,#7f1d1d,#ef4444)',
  ];

  async function loadCerts(){
    try{
      var res=await Api.certificates.list();
      var certs=(res&&res.data)||[];
      var grid=document.getElementById('cert-grid');
      if(!certs.length){
        grid.innerHTML='<div class="empty-box" style="grid-column:1/-1;"><div class="empty-box-icon">🏆</div><div class="empty-box-title">No certificates yet</div><p style="color:var(--text-muted);font-size:var(--font-size-sm);">Complete a course to earn your first certificate.</p></div>';
        return;
      }
      grid.innerHTML=certs.map(function(c,i){
        var bg=bannerColors[i%bannerColors.length];
        var issued=c.issued_at?Utils.formatDate(c.issued_at):'';
        return '<div class="cert-card">'+
          '<div class="cert-banner" style="background:'+bg+';">'+
            '<div class="cert-banner-inner"><div class="cert-icon">🏆</div><div style="font-size:var(--font-size-xs);font-weight:700;color:rgba(255,255,255,0.8);margin-top:4px;letter-spacing:0.05em;text-transform:uppercase;">Certificate of Completion</div></div>'+
          '</div>'+
          '<div class="cert-body">'+
            '<div class="cert-title">'+_esc(c.course_title||c.title)+'</div>'+
            '<div class="cert-course">Issued to '+_esc(name)+'</div>'+
            '<div class="cert-meta">'+
              '<div><div class="cert-date">'+issued+'</div><div class="cert-id">'+_esc(c.certificate_code||c.id)+'</div></div>'+
              '<div style="display:flex;gap:var(--space-2);">'+
                '<button class="btn btn-outline btn-sm" onclick="downloadCert('+c.id+',\''+_esc(c.course_title||c.title)+'\')"><i data-feather="download" style="width:14px;height:14px;"></i> Download</button>'+
                '<button class="btn btn-ghost btn-sm" onclick="copyCertLink(\''+_esc(c.certificate_code||c.id)+'\')"><i data-feather="share-2" style="width:14px;height:14px;"></i></button>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('');
      if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});
    }catch(err){
      document.getElementById('cert-grid').innerHTML='<div style="color:var(--color-danger);padding:var(--space-4);">Failed to load certificates.</div>';
    }
  }

  window.downloadCert=async function(id,title){
    try{
      var res=await Api.certificates.download(id);
      if(res&&res.data&&res.data.download_url){ Utils.download(res.data.download_url,title+'.pdf'); }
      else showToast('error','Error','Download URL not available.');
    }catch(err){ showToast('error','Error',(err&&err.message)||'Download failed.'); }
  };

  window.copyCertLink=async function(code){
    var url=window.location.origin+'/pages/auth/verify-email.html?code='+code;
    var ok=await Utils.copyToClipboard(url);
    showToast(ok?'success':'error',ok?'Link Copied!':'Failed','');
  };

  function showToast(type,title,msg){
    var c=document.getElementById('toast-container');
    var el=document.createElement('div');
    el.className='toast toast-'+type;
    el.innerHTML='<div class="toast-content"><div class="toast-title">'+_esc(title)+'</div>'+(msg?'<div style="font-size:var(--font-size-xs);color:var(--text-muted);">'+_esc(msg)+'</div>':'')+'</div><button class="toast-close" onclick="this.closest(\'.toast\').remove()">✕</button>';
    c.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.remove();},3000);
  }
  function _esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  loadCerts();
});
</script>
</body>
</html>
