<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — EduVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.1/feather.min.js" defer></script>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/reset.css" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <script>try{if(localStorage.getItem('ev_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.classList.add('dark');}}catch(e){}</script>
  <style>
    .profile-layout{display:grid;grid-template-columns:280px 1fr;gap:var(--space-6);align-items:start;}
    .profile-card{background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);overflow:hidden;}
    .profile-card-header{padding:var(--space-5) var(--space-6);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;}
    .profile-card-title{font-size:var(--font-size-base);font-weight:600;color:var(--text-primary);}
    .profile-card-body{padding:var(--space-6);}
    .avatar-section{text-align:center;padding:var(--space-8) var(--space-6) var(--space-6);}
    .profile-avatar-wrap{position:relative;display:inline-block;margin-bottom:var(--space-4);}
    .profile-avatar-lg{width:96px;height:96px;border-radius:50%;background:var(--color-primary-100);display:flex;align-items:center;justify-content:center;font-size:var(--font-size-3xl);font-weight:800;color:var(--color-primary-700);overflow:hidden;}
    .avatar-upload-btn{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--color-primary-600);border:2px solid var(--bg-surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;}
    .profile-name{font-size:var(--font-size-xl);font-weight:700;color:var(--text-primary);margin-bottom:4px;}
    .profile-role-badge{display:inline-flex;align-items:center;gap:4px;background:var(--color-primary-50);color:var(--color-primary-700);padding:3px 10px;border-radius:99px;font-size:var(--font-size-xs);font-weight:600;}
    .profile-stat-row{display:flex;justify-content:space-around;padding:var(--space-4) 0;border-top:1px solid var(--border-color);margin-top:var(--space-4);}
    .profile-stat{text-align:center;}
    .profile-stat-val{font-size:var(--font-size-xl);font-weight:800;color:var(--text-primary);line-height:1;}
    .profile-stat-label{font-size:10px;color:var(--text-muted);font-weight:500;margin-top:2px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}
    .form-grid-full{grid-column:1/-1;}
    .skel{background:var(--neutral-100);border-radius:4px;animation:shimmer 1.5s infinite;}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--space-3);max-width:360px;}
    .toast{background:var(--bg-elevated);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--shadow-lg);padding:var(--space-4);display:flex;align-items:flex-start;gap:var(--space-3);}
    .toast-success{border-left:4px solid var(--color-success);}
    .toast-error{border-left:4px solid var(--color-danger);}
    .toast-content{flex:1;}.toast-title{font-size:var(--font-size-sm);font-weight:600;}.toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);}
    @media(max-width:1023px){.profile-layout{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <aside class="app-sidebar" id="app-sidebar">
    <a class="sidebar-brand" href="../../index.html"><div class="sidebar-logo">E</div><div><div class="sidebar-brand-name">EduVerse</div><div class="sidebar-brand-tagline">Student Portal</div></div></a>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon"><i data-feather="grid"></i></span><span class="sidebar-item-label">Dashboard</span></a>
      <a class="sidebar-item" href="courses.html"><span class="sidebar-item-icon"><i data-feather="book-open"></i></span><span class="sidebar-item-label">My Courses</span></a>
      <a class="sidebar-item" href="assignments.html"><span class="sidebar-item-icon"><i data-feather="clipboard"></i></span><span class="sidebar-item-label">Assignments</span></a>
      <a class="sidebar-item" href="performance.html"><span class="sidebar-item-icon"><i data-feather="trending-up"></i></span><span class="sidebar-item-label">Performance</span></a>
      <a class="sidebar-item" href="materials.html"><span class="sidebar-item-icon"><i data-feather="file-text"></i></span><span class="sidebar-item-label">Study Materials</span></a>
      <a class="sidebar-item" href="calendar.html"><span class="sidebar-item-icon"><i data-feather="calendar"></i></span><span class="sidebar-item-label">Calendar</span></a>
      <a class="sidebar-item" href="messages.html"><span class="sidebar-item-icon"><i data-feather="message-circle"></i></span><span class="sidebar-item-label">Messages</span></a>
      <a class="sidebar-item" href="certificates.html"><span class="sidebar-item-icon"><i data-feather="award"></i></span><span class="sidebar-item-label">Certificates</span></a>
      <div class="sidebar-divider"></div>
      <a class="sidebar-item active" href="profile.html"><span class="sidebar-item-icon"><i data-feather="user"></i></span><span class="sidebar-item-label">Profile</span></a>
    </nav>
  <div class="sidebar-user">...</div>
    <button class="sidebar-toggle" id="sidebar-collapse-btn" aria-label="Collapse sidebar">
      <i data-feather="chevron-left"></i>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-body">
    <header class="app-navbar">
      <div class="navbar-left">
        <button class="navbar-menu-btn" id="navbar-menu-btn"><i data-feather="menu"></i></button>
        <button class="btn-icon btn-ghost" id="sidebar-collapse-btn"><i data-feather="sidebar"></i></button>
      </div>
      <div class="navbar-right">
        <button class="btn-icon btn-ghost" data-action="toggle-theme"><i data-feather="sun"></i></button>
        <div class="navbar-user" id="navbar-user-trigger" style="cursor:pointer;"><div class="avatar avatar-sm" id="navbar-avatar"></div><span class="navbar-user-name" id="navbar-user-name"></span></div>
        <div class="dropdown" id="user-dropdown" hidden>
          <div class="dropdown-header"><div class="dropdown-user-name" id="dd-user-name"></div><div class="dropdown-user-role">Student</div></div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-item-danger" data-action="logout"><i data-feather="log-out"></i> Sign Out</button>
        </div>
      </div>
    </header>
    <main class="app-main">
      <div class="page-content">
        <div class="page-header" style="margin-bottom:var(--space-6);"><div><h1 class="page-title">My Profile</h1><p class="page-subtitle">Manage your personal information and account settings</p></div></div>
        <div class="profile-layout">
          <!-- Left: Avatar + stats -->
          <div>
            <div class="profile-card">
              <div class="avatar-section">
                <div class="profile-avatar-wrap">
                  <div class="profile-avatar-lg" id="profile-avatar-lg"></div>
                  <div class="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()"><i data-feather="camera" style="width:12px;height:12px;"></i></div>
                </div>
                <input type="file" id="avatar-input" style="display:none;" accept="image/jpeg,image/png,image/webp" />
                <div class="profile-name" id="profile-name-display">—</div>
                <div style="margin-top:var(--space-2);"><span class="profile-role-badge">🎓 Student</span></div>
                <div class="profile-stat-row">
                  <div class="profile-stat"><div class="profile-stat-val" id="ps-courses">—</div><div class="profile-stat-label">Courses</div></div>
                  <div class="profile-stat"><div class="profile-stat-val" id="ps-certs">—</div><div class="profile-stat-label">Certs</div></div>
                  <div class="profile-stat"><div class="profile-stat-val" id="ps-score">—</div><div class="profile-stat-label">Avg Score</div></div>
                </div>
              </div>
            </div>
            <!-- Change Password -->
            <div class="profile-card" style="margin-top:var(--space-4);">
              <div class="profile-card-header"><div class="profile-card-title">Change Password</div></div>
              <div class="profile-card-body">
                <div class="form-group" style="margin-bottom:var(--space-4);">
                  <label class="form-label">Current Password</label>
                  <input type="password" class="form-input" id="pw-current" placeholder="Enter current password" />
                </div>
                <div class="form-group" style="margin-bottom:var(--space-4);">
                  <label class="form-label">New Password</label>
                  <input type="password" class="form-input" id="pw-new" placeholder="Min. 8 characters" />
                </div>
                <div class="form-group" style="margin-bottom:var(--space-5);">
                  <label class="form-label">Confirm New Password</label>
                  <input type="password" class="form-input" id="pw-confirm" placeholder="Re-enter new password" />
                </div>
                <button class="btn btn-outline" style="width:100%;" id="change-pw-btn">Update Password</button>
              </div>
            </div>
          </div>
          <!-- Right: Edit form -->
          <div class="profile-card">
            <div class="profile-card-header">
              <div class="profile-card-title">Personal Information</div>
              <button class="btn btn-primary btn-sm" id="save-profile-btn">Save Changes</button>
            </div>
            <div class="profile-card-body">
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-input" id="f-name" placeholder="Your full name" /></div>
                <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" id="f-email" placeholder="you@example.com" readonly style="background:var(--bg-sunken);cursor:not-allowed;" /></div>
                <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" id="f-phone" placeholder="10-digit number" /></div>
                <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" class="form-input" id="f-dob" /></div>
                <div class="form-group"><label class="form-label">Grade / Level</label>
                  <select class="form-input" id="f-grade" style="cursor:pointer;">
                    <option value="">Select grade</option>
                    <option value="preschool">Pre-School</option><option value="primary">Primary (1–5)</option>
                    <option value="middle">Middle (6–8)</option><option value="high">High School (9–12)</option>
                    <option value="ug">Undergraduate</option><option value="pg">Postgraduate</option>
                  </select>
                </div>
                <div class="form-group"><label class="form-label">Institute Code</label><input type="text" class="form-input" id="f-inst-code" placeholder="Optional" /></div>
                <div class="form-group form-grid-full"><label class="form-label">Bio / About</label><textarea class="form-input" id="f-bio" rows="4" placeholder="Tell us a bit about yourself…" style="height:auto;resize:vertical;padding:var(--space-3);"></textarea></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
<script>window.EV_BASE="../../";</script>
<script src="../../js/utils.js"></script>
<script src="../../js/store.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/init.js"></script>
<script>
(function(){var t,u;try{t=localStorage.getItem('ev_token');u=t?JSON.parse(localStorage.getItem('ev_user')):null;}catch(e){}if(!t||!u){window.location.replace('../../pages/auth/login.html');return;}if(u.role!=='student'){window.location.replace('../../pages/errors/403.html');}})();
document.addEventListener('DOMContentLoaded',function(){
  if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});
  var user;try{user=JSON.parse(localStorage.getItem('ev_user'))||{};}catch(e){user={};}
  var name=user.name||'';
  ['sidebar-user-name','navbar-user-name','dd-user-name'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=name;});
  var initials=name.trim().split(/\s+/).reduce(function(a,p,i,arr){return i===0||i===arr.length-1?a+p[0].toUpperCase():a;},'');
  ['sidebar-avatar','navbar-avatar'].forEach(function(id){var el=document.getElementById(id);if(!el)return;if(user.avatar){el.innerHTML='<img src="'+user.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>';}else{el.textContent=initials;}});
  var shell=document.getElementById('app-shell');
  document.getElementById('navbar-menu-btn').addEventListener('click',function(){shell.classList.toggle('sidebar-open');});
  document.getElementById('sidebar-overlay').addEventListener('click',function(){shell.classList.remove('sidebar-open');});
var colBtn = document.getElementById('sidebar-collapse-btn');
if (colBtn) {
  colBtn.addEventListener('click', function() {
    var c = shell.classList.toggle('sidebar-collapsed');
    try { localStorage.setItem('ev_sidebar_collapsed', String(c)); } catch(e) {}
  });
}
try {
  if (localStorage.getItem('ev_sidebar_collapsed') === 'true') {
    shell.classList.add('sidebar-collapsed');
  } else {
    shell.classList.remove('sidebar-collapsed');
  }
} catch(e) {}

  document.querySelectorAll('[data-action="toggle-theme"]').forEach(function(btn){btn.addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');document.documentElement.setAttribute('data-theme',d?'dark':'light');});});
  var trigger=document.getElementById('navbar-user-trigger'),dropdown=document.getElementById('user-dropdown');
  if(trigger&&dropdown){trigger.addEventListener('click',function(e){e.stopPropagation();dropdown.hidden=!dropdown.hidden;});document.addEventListener('click',function(){if(dropdown)dropdown.hidden=true;});}
  document.querySelectorAll('[data-action="logout"]').forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();try{localStorage.removeItem('ev_token');localStorage.removeItem('ev_user');}catch(e){}window.location.replace('../../pages/auth/login.html');});});

  async function loadProfile(){
    try{
      var res=await Api.student.profile();
      var p=(res&&res.data)||{};
      // Populate form
      document.getElementById('f-name').value=p.name||'';
      document.getElementById('f-email').value=p.email||'';
      document.getElementById('f-phone').value=p.phone||'';
      document.getElementById('f-dob').value=p.dob?Utils.formatDate(p.dob,'input'):'';
      document.getElementById('f-grade').value=p.grade||'';
      document.getElementById('f-inst-code').value=p.institute_code||'';
      document.getElementById('f-bio').value=p.bio||'';
      // Avatar
      document.getElementById('profile-name-display').textContent=p.name||'—';
      var avatarEl=document.getElementById('profile-avatar-lg');
      if(p.avatar){ avatarEl.innerHTML='<img src="'+p.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>'; }
      else{ avatarEl.textContent=initials; }
      // Stats
      document.getElementById('ps-courses').textContent=p.enrolled_courses||'0';
      document.getElementById('ps-certs').textContent=p.certificates||'0';
      document.getElementById('ps-score').textContent=p.avg_score!=null?p.avg_score+'%':'—';
    }catch(e){}
  }

  document.getElementById('save-profile-btn').addEventListener('click',async function(){
    this.disabled=true; this.textContent='Saving…';
    try{
      var data={name:document.getElementById('f-name').value,phone:document.getElementById('f-phone').value,dob:document.getElementById('f-dob').value||undefined,grade:document.getElementById('f-grade').value||undefined,bio:document.getElementById('f-bio').value,institute_code:document.getElementById('f-inst-code').value||undefined};
      await Auth.updateProfile(data);
      showToast('success','Saved!','Profile updated successfully.');
      document.getElementById('profile-name-display').textContent=data.name;
      ['sidebar-user-name','navbar-user-name','dd-user-name'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=data.name;});
    }catch(err){ showToast('error','Error',(err&&err.message)||'Failed to save.'); }
    this.disabled=false; this.textContent='Save Changes';
  });

  document.getElementById('avatar-input').addEventListener('change',async function(){
    if(!this.files[0]) return;
    try{
      await Auth.uploadAvatar(this.files[0]);
      var url=URL.createObjectURL(this.files[0]);
      document.getElementById('profile-avatar-lg').innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>';
      showToast('success','Avatar updated!','');
    }catch(err){ showToast('error','Error',(err&&err.message)||'Upload failed.'); }
  });

  document.getElementById('change-pw-btn').addEventListener('click',async function(){
    var current=document.getElementById('pw-current').value;
    var newPw=document.getElementById('pw-new').value;
    var confirm=document.getElementById('pw-confirm').value;
    if(!current||!newPw||!confirm){ showToast('error','Error','All password fields are required.'); return; }
    if(newPw!==confirm){ showToast('error','Error','New passwords do not match.'); return; }
    var valid=Utils.validatePassword(newPw);
    if(!valid.valid){ showToast('error','Error',valid.message); return; }
    this.disabled=true; this.textContent='Updating…';
    try{
      await Api.patch('/student/profile/password',{current_password:current,new_password:newPw});
      showToast('success','Password updated!','Please sign in again.');
      document.getElementById('pw-current').value='';
      document.getElementById('pw-new').value='';
      document.getElementById('pw-confirm').value='';
    }catch(err){ showToast('error','Error',(err&&err.message)||'Failed to update password.'); }
    this.disabled=false; this.textContent='Update Password';
  });

  function showToast(type,title,msg){
    var c=document.getElementById('toast-container');
    var el=document.createElement('div');
    el.className='toast toast-'+type;
    el.innerHTML='<div class="toast-content"><div class="toast-title">'+title+'</div>'+(msg?'<div style="font-size:var(--font-size-xs);color:var(--text-muted);">'+msg+'</div>':'')+'</div><button class="toast-close" onclick="this.closest(\'.toast\').remove()">✕</button>';
    c.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.remove();},4000);
  }
  loadProfile();
});
</script>
</body>
</html>
