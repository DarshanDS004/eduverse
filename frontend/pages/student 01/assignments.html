<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments — EduVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.1/feather.min.js" defer></script>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/reset.css" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <script>try{if(localStorage.getItem('ev_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.classList.add('dark');}}catch(e){}</script>
  <style>
    .page-tabs{display:flex;gap:0;border-bottom:2px solid var(--border-color);margin-bottom:var(--space-6);}
    .page-tab{padding:var(--space-3) var(--space-5);font-size:var(--font-size-sm);font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-ui);transition:all var(--transition-fast);}
    .page-tab:hover{color:var(--text-primary);}
    .page-tab.active{color:var(--color-primary-600);border-bottom-color:var(--color-primary-600);font-weight:600;}
    .tab-panel{display:none;}.tab-panel.active{display:block;}

    .assignment-card{background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);padding:var(--space-5);margin-bottom:var(--space-4);transition:all var(--transition-fast);display:flex;align-items:flex-start;gap:var(--space-4);}
    .assignment-card:hover{box-shadow:var(--shadow-md);}
    .assignment-date-box{flex-shrink:0;width:52px;text-align:center;background:var(--bg-sunken);border-radius:var(--border-radius-md);padding:var(--space-2);}
    .assignment-date-day{font-size:var(--font-size-2xl);font-weight:800;color:var(--text-primary);line-height:1;}
    .assignment-date-month{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);}
    .assignment-info{flex:1;min-width:0;}
    .assignment-title{font-size:var(--font-size-base);font-weight:600;color:var(--text-primary);margin-bottom:var(--space-1);}
    .assignment-course{font-size:var(--font-size-xs);color:var(--color-primary-600);font-weight:600;margin-bottom:var(--space-1);}
    .assignment-desc{font-size:var(--font-size-sm);color:var(--text-muted);margin-bottom:var(--space-3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .assignment-meta{display:flex;align-items:center;gap:var(--space-4);font-size:var(--font-size-xs);color:var(--text-muted);}
    .assignment-meta span{display:flex;align-items:center;gap:4px;}
    .assignment-status{flex-shrink:0;text-align:right;}
    .due-urgent{color:var(--color-danger);font-weight:700;}
    .due-soon{color:var(--color-warning);font-weight:700;}
    .due-later{color:var(--text-muted);}

    .filters-bar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-6);padding:var(--space-4);background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);}
    .filter-select{height:36px;padding:0 var(--space-3);border:1px solid var(--border-color);border-radius:var(--border-radius-md);font-size:var(--font-size-sm);color:var(--text-primary);background:var(--bg-page);cursor:pointer;outline:none;font-family:var(--font-ui);}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap input{width:100%;height:36px;padding:0 var(--space-4) 0 var(--space-9);border:1px solid var(--border-color);border-radius:var(--border-radius-md);font-size:var(--font-size-sm);color:var(--text-primary);background:var(--bg-page);outline:none;font-family:var(--font-ui);}
    .search-wrap input:focus{border-color:var(--color-primary-600);}
    .search-wrap .search-icon{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
    .skel{background:var(--neutral-100);border-radius:4px;animation:shimmer 1.5s infinite;}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
    .empty-box{text-align:center;padding:var(--space-12);color:var(--text-muted);}
    .empty-box-icon{font-size:3rem;margin-bottom:var(--space-3);}
    .empty-box-title{font-size:var(--font-size-lg);font-weight:600;color:var(--text-primary);margin-bottom:var(--space-2);}
    .empty-box-text{font-size:var(--font-size-sm);}

    /* Submit modal */
    .modal-overlay{position:fixed;inset:0;background:var(--bg-overlay);z-index:var(--z-modal);display:none;align-items:center;justify-content:center;padding:var(--space-4);}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg-elevated);border-radius:var(--border-radius-xl);box-shadow:var(--shadow-modal);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-5) var(--space-6);border-bottom:1px solid var(--border-color);}
    .modal-title{font-size:var(--font-size-lg);font-weight:600;color:var(--text-primary);}
    .modal-body{padding:var(--space-6);}
    .modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:var(--space-3);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-color);}

    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--space-3);max-width:360px;}
    .toast{background:var(--bg-elevated);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--shadow-lg);padding:var(--space-4);display:flex;align-items:flex-start;gap:var(--space-3);}
    .toast-success{border-left:4px solid var(--color-success);}
    .toast-error{border-left:4px solid var(--color-danger);}
    .toast-content{flex:1;}.toast-title{font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);}
    .toast-message{font-size:var(--font-size-xs);color:var(--text-muted);margin-top:2px;}
    .toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;}
  </style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <aside class="app-sidebar" id="app-sidebar">
    <a class="sidebar-brand" href="../../index.html">
      <div class="sidebar-logo">E</div>
      <div><div class="sidebar-brand-name">EduVerse</div><div class="sidebar-brand-tagline">Student Portal</div></div>
    </a>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon"><i data-feather="grid"></i></span><span class="sidebar-item-label">Dashboard</span></a>
      <a class="sidebar-item" href="courses.html"><span class="sidebar-item-icon"><i data-feather="book-open"></i></span><span class="sidebar-item-label">My Courses</span></a>
      <a class="sidebar-item active" href="assignments.html"><span class="sidebar-item-icon"><i data-feather="clipboard"></i></span><span class="sidebar-item-label">Assignments</span></a>
      <a class="sidebar-item" href="performance.html"><span class="sidebar-item-icon"><i data-feather="trending-up"></i></span><span class="sidebar-item-label">Performance</span></a>
      <a class="sidebar-item" href="materials.html"><span class="sidebar-item-icon"><i data-feather="file-text"></i></span><span class="sidebar-item-label">Study Materials</span></a>
      <a class="sidebar-item" href="calendar.html"><span class="sidebar-item-icon"><i data-feather="calendar"></i></span><span class="sidebar-item-label">Calendar</span></a>
      <a class="sidebar-item" href="messages.html"><span class="sidebar-item-icon"><i data-feather="message-circle"></i></span><span class="sidebar-item-label">Messages</span></a>
      <a class="sidebar-item" href="certificates.html"><span class="sidebar-item-icon"><i data-feather="award"></i></span><span class="sidebar-item-label">Certificates</span></a>
      <div class="sidebar-divider"></div>
      <a class="sidebar-item" href="profile.html"><span class="sidebar-item-icon"><i data-feather="user"></i></span><span class="sidebar-item-label">Profile</span></a>
    </nav>
    <div class="sidebar-user">...</div>
    <button class="sidebar-toggle" id="sidebar-collapse-btn" aria-label="Collapse sidebar">
      <i data-feather="chevron-left"></i>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-body">
    <header class="app-navbar">
      <div class="navbar-left">
        <button class="navbar-menu-btn" id="navbar-menu-btn"><i data-feather="menu"></i></button>
        
      </div>
      <div class="navbar-right">
        <button class="btn-icon btn-ghost" data-action="toggle-theme"><i data-feather="sun"></i></button>
        <div class="navbar-user" id="navbar-user-trigger" style="cursor:pointer;">
          <div class="avatar avatar-sm" id="navbar-avatar"></div>
          <span class="navbar-user-name" id="navbar-user-name"></span>
          <i data-feather="chevron-down" style="width:14px;height:14px;color:var(--text-muted);"></i>
        </div>
        <div class="dropdown" id="user-dropdown" hidden>
          <div class="dropdown-header"><div class="dropdown-user-name" id="dd-user-name"></div><div class="dropdown-user-role">Student</div></div>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" href="profile.html"><i data-feather="user"></i> Profile</a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-item-danger" data-action="logout"><i data-feather="log-out"></i> Sign Out</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="page-content">
        <div class="page-header">
          <div><h1 class="page-title">Assignments</h1><p class="page-subtitle">Track and submit your course assignments</p></div>
        </div>

        <div class="page-tabs">
          <button class="page-tab active" data-tab="pending">Pending <span id="pending-count" style="background:var(--color-danger);color:#fff;border-radius:99px;padding:1px 6px;font-size:10px;margin-left:4px;"></span></button>
          <button class="page-tab" data-tab="submitted">Submitted</button>
          <button class="page-tab" data-tab="graded">Graded</button>
        </div>

        <div class="tab-panel active" id="tab-pending">
          <div class="filters-bar">
            <div class="search-wrap">
              <i data-feather="search" class="search-icon" style="width:16px;height:16px;"></i>
              <input type="text" placeholder="Search assignments…" id="search-input" />
            </div>
            <select class="filter-select" id="filter-course"><option value="">All Courses</option></select>
            <select class="filter-select" id="filter-sort">
              <option value="deadline_asc">Due Soonest</option>
              <option value="deadline_desc">Due Latest</option>
            </select>
          </div>
          <div id="pending-list"><div class="skel" style="height:100px;border-radius:12px;margin-bottom:12px;"></div><div class="skel" style="height:100px;border-radius:12px;margin-bottom:12px;"></div><div class="skel" style="height:100px;border-radius:12px;"></div></div>
        </div>

        <div class="tab-panel" id="tab-submitted">
          <div id="submitted-list"><div class="skel" style="height:100px;border-radius:12px;margin-bottom:12px;"></div><div class="skel" style="height:100px;border-radius:12px;"></div></div>
        </div>

        <div class="tab-panel" id="tab-graded">
          <div id="graded-list"><div class="skel" style="height:100px;border-radius:12px;margin-bottom:12px;"></div><div class="skel" style="height:100px;border-radius:12px;"></div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="submit-modal-title">Submit Assignment</div>
      <button class="btn-icon btn-ghost btn-sm" id="submit-modal-close"><i data-feather="x"></i></button>
    </div>
    <div class="modal-body">
      <div id="submit-modal-info" style="background:var(--bg-sunken);border-radius:var(--border-radius-md);padding:var(--space-4);margin-bottom:var(--space-5);"></div>
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label">Your Answer / Notes</label>
        <textarea class="form-input" id="submit-text" rows="5" placeholder="Type your answer or notes here…" style="height:auto;resize:vertical;padding:var(--space-3);"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Attach File (optional)</label>
        <div class="dropzone" id="submit-dropzone" style="padding:var(--space-6);">
          <div style="font-size:1.5rem;margin-bottom:8px;">📎</div>
          <div style="font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);">Click to upload or drag & drop</div>
          <div style="font-size:var(--font-size-xs);color:var(--text-muted);margin-top:4px;">PDF, DOC, DOCX, ZIP up to 10 MB</div>
        </div>
        <input type="file" id="submit-file" style="display:none;" accept=".pdf,.doc,.docx,.zip,.txt" />
        <div id="submit-file-name" style="font-size:var(--font-size-xs);color:var(--color-primary-600);margin-top:4px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="submit-cancel">Cancel</button>
      <button class="btn btn-primary" id="submit-confirm">Submit Assignment</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>window.EV_BASE="../../";</script>
<script src="../../js/utils.js"></script>
<script src="../../js/store.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/router.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/init.js"></script>

<script>
(function(){var t,u;try{t=localStorage.getItem('ev_token');u=t?JSON.parse(localStorage.getItem('ev_user')):null;}catch(e){}if(!t||!u){window.location.replace('../../pages/auth/login.html');return;}if(u.role!=='student'){window.location.replace('../../pages/errors/403.html');}})();

document.addEventListener('DOMContentLoaded',function(){
  if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});

  var user; try{user=JSON.parse(localStorage.getItem('ev_user'))||{};}catch(e){user={};}
  var name=user.name||'';
  var initials=name.trim().split(/\s+/).reduce(function(a,p,i,arr){return i===0||i===arr.length-1?a+p[0].toUpperCase():a;},'');
  ['sidebar-user-name','navbar-user-name','dd-user-name'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=name;});
  ['sidebar-avatar','navbar-avatar'].forEach(function(id){var el=document.getElementById(id);if(!el)return;if(user.avatar){el.innerHTML='<img src="'+user.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>';}else{el.textContent=initials;}});

  var shell=document.getElementById('app-shell');
  document.getElementById('navbar-menu-btn').addEventListener('click',function(){shell.classList.toggle('sidebar-open');});
  document.getElementById('sidebar-overlay').addEventListener('click',function(){shell.classList.remove('sidebar-open');});

  var colBtn = document.getElementById('sidebar-collapse-btn');
if (colBtn) {
  colBtn.addEventListener('click', function() {
    var c = shell.classList.toggle('sidebar-collapsed');
    try { localStorage.setItem('ev_sidebar_collapsed', String(c)); } catch(e) {}
  });
}
try {
  if (localStorage.getItem('ev_sidebar_collapsed') === 'true') {
    shell.classList.add('sidebar-collapsed');
  } else {
    shell.classList.remove('sidebar-collapsed');
  }
} catch(e) {}

  document.querySelectorAll('[data-action="toggle-theme"]').forEach(function(btn){btn.addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');document.documentElement.setAttribute('data-theme',d?'dark':'light');try{localStorage.setItem('ev_theme',d?'dark':'light');}catch(e){}});});
  var trigger=document.getElementById('navbar-user-trigger'),dropdown=document.getElementById('user-dropdown');
  if(trigger&&dropdown){trigger.addEventListener('click',function(e){e.stopPropagation();dropdown.hidden=!dropdown.hidden;});document.addEventListener('click',function(){if(dropdown)dropdown.hidden=true;});}
  document.querySelectorAll('[data-action="logout"]').forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();try{localStorage.removeItem('ev_token');localStorage.removeItem('ev_user');localStorage.removeItem('ev_refresh_token');}catch(e){}window.location.replace('../../pages/auth/login.html');});});

  // Tabs
  document.querySelectorAll('.page-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.page-tab').forEach(function(t){t.classList.remove('active');});
      document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
      tab.classList.add('active');
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    });
  });

  var allAssignments=[], selectedAssignment=null;

  async function loadAssignments(){
    try{
      var res = await Api.student.assignments();
      var data = (res&&res.data)||[];
      allAssignments = data;

      // Populate course filter
      var courses={};
      data.forEach(function(a){if(a.course_id&&a.course_title){courses[a.course_id]=a.course_title;}});
      var sel=document.getElementById('filter-course');
      Object.keys(courses).forEach(function(id){var o=document.createElement('option');o.value=id;o.textContent=courses[id];sel.appendChild(o);});

      renderByStatus();
    }catch(err){
      ['pending-list','submitted-list','graded-list'].forEach(function(id){
        var el=document.getElementById(id);
        if(el) el.innerHTML='<div style="color:var(--color-danger);padding:var(--space-4);">Failed to load assignments.</div>';
      });
    }
  }

  function renderByStatus(){
    var pending=[], submitted=[], graded=[];
    var q=document.getElementById('search-input').value.toLowerCase();
    var courseFilter=document.getElementById('filter-course').value;
    allAssignments.forEach(function(a){
      if(q&&!a.title.toLowerCase().includes(q)) return;
      if(courseFilter&&a.course_id!=courseFilter) return;
      if(a.status==='graded') graded.push(a);
      else if(a.status==='submitted') submitted.push(a);
      else pending.push(a);
    });
    // Sort pending by deadline
    pending.sort(function(a,b){return new Date(a.deadline)-new Date(b.deadline);});
    renderList('pending-list',pending,'pending');
    renderList('submitted-list',submitted,'submitted');
    renderList('graded-list',graded,'graded');
    var cnt=document.getElementById('pending-count');
    if(cnt){cnt.textContent=pending.length||'';cnt.style.display=pending.length?'':'none';}
  }

  function renderList(containerId,items,type){
    var el=document.getElementById(containerId);
    if(!el) return;
    if(!items.length){
      var msg=type==='pending'?'No pending assignments! 🎉':type==='submitted'?'No submitted assignments yet.':'No graded assignments yet.';
      el.innerHTML='<div class="empty-box"><div class="empty-box-icon">'+(type==='pending'?'✅':'📋')+'</div><div class="empty-box-title">'+msg+'</div></div>';
      return;
    }
    el.innerHTML=items.map(function(a){
      var deadline=a.deadline?new Date(a.deadline):null;
      var daysLeft=deadline?Math.ceil((deadline-new Date())/86400000):null;
      var isLate=deadline&&deadline<new Date();
      var urgency=isLate?'due-urgent':daysLeft<=2?'due-soon':'due-later';
      var day=deadline?deadline.getDate():'—';
      var month=deadline?deadline.toLocaleString('en',{month:'short'}):'';
      var dueText=isLate?'Overdue':daysLeft===0?'Due today':daysLeft===1?'Due tomorrow':daysLeft!=null?'In '+daysLeft+' days':'—';
      var actionBtn='';
      if(type==='pending') actionBtn='<button class="btn btn-primary btn-sm" onclick="openSubmit('+JSON.stringify(a).replace(/"/g,'&quot;')+')">Submit</button>';
      else if(type==='graded') actionBtn='<div style="text-align:right;"><div style="font-size:var(--font-size-xl);font-weight:800;color:var(--color-success);">'+(a.score!=null?a.score+'/'+a.total_score:'—')+'</div><div style="font-size:var(--font-size-xs);color:var(--text-muted);">Score</div></div>';
      else actionBtn='<span style="background:var(--color-info-light);color:var(--color-info-dark);padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;">Submitted</span>';
      return '<div class="assignment-card">'+
        '<div class="assignment-date-box"><div class="assignment-date-day">'+day+'</div><div class="assignment-date-month">'+month+'</div></div>'+
        '<div class="assignment-info">'+
          '<div class="assignment-course">'+_esc(a.course_title||'Course')+'</div>'+
          '<div class="assignment-title">'+_esc(a.title)+'</div>'+
          '<div class="assignment-desc">'+_esc(a.description||'')+'</div>'+
          '<div class="assignment-meta">'+
            (deadline?'<span><i data-feather="clock" style="width:12px;height:12px;"></i><span class="'+urgency+'">'+dueText+'</span></span>':'')+
            (a.max_score?'<span><i data-feather="award" style="width:12px;height:12px;"></i>'+a.max_score+' pts</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="assignment-status">'+actionBtn+'</div>'+
      '</div>';
    }).join('');
    if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});
  }

  var debounce;
  document.getElementById('search-input').addEventListener('input',function(){clearTimeout(debounce);debounce=setTimeout(renderByStatus,300);});
  document.getElementById('filter-course').addEventListener('change',renderByStatus);
  document.getElementById('filter-sort').addEventListener('change',renderByStatus);

  // Submit modal
  window.openSubmit=function(assignment){
    selectedAssignment=typeof assignment==='string'?JSON.parse(assignment):assignment;
    document.getElementById('submit-modal-title').textContent='Submit: '+selectedAssignment.title;
    document.getElementById('submit-modal-info').innerHTML=
      '<div style="font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);margin-bottom:4px;">'+_esc(selectedAssignment.title)+'</div>'+
      '<div style="font-size:var(--font-size-xs);color:var(--text-muted);">'+_esc(selectedAssignment.description||'')+'</div>';
    document.getElementById('submit-text').value='';
    document.getElementById('submit-file-name').textContent='';
    document.getElementById('submit-modal').classList.add('open');
    if(typeof feather!=='undefined') feather.replace({'stroke-width':1.75});
  };
  document.getElementById('submit-modal-close').addEventListener('click',closeSubmit);
  document.getElementById('submit-cancel').addEventListener('click',closeSubmit);
  document.getElementById('submit-modal').addEventListener('click',function(e){if(e.target===this)closeSubmit();});
  function closeSubmit(){document.getElementById('submit-modal').classList.remove('open');selectedAssignment=null;}

  document.getElementById('submit-dropzone').addEventListener('click',function(){document.getElementById('submit-file').click();});
  document.getElementById('submit-file').addEventListener('change',function(){
    if(this.files[0]) document.getElementById('submit-file-name').textContent='📎 '+this.files[0].name;
  });

  document.getElementById('submit-confirm').addEventListener('click',async function(){
    if(!selectedAssignment) return;
    this.disabled=true; this.textContent='Submitting…';
    try{
      var text=document.getElementById('submit-text').value;
      var file=document.getElementById('submit-file').files[0];
      var formData=new FormData();
      formData.append('assignment_id',selectedAssignment.id);
      if(text) formData.append('text',text);
      if(file) formData.append('file',file);
      await Api.post('/student/assignments/'+selectedAssignment.id+'/submit',{text:text});
      closeSubmit();
      showToast('success','Submitted!','Your assignment has been submitted.');
      await loadAssignments();
    }catch(err){
      showToast('error','Error',(err&&err.message)||'Submission failed.');
    }
    this.disabled=false; this.textContent='Submit Assignment';
  });

  function showToast(type,title,msg){
    var c=document.getElementById('toast-container');
    var id='toast-'+Date.now();
    var el=document.createElement('div');
    el.id=id; el.className='toast toast-'+type;
    el.innerHTML='<div class="toast-content"><div class="toast-title">'+_esc(title)+'</div><div class="toast-message">'+_esc(msg)+'</div></div><button class="toast-close" onclick="this.closest(\'.toast\').remove()">✕</button>';
    c.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.remove();},4000);
  }

  function _esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  loadAssignments();
});
</script>

<script>
(function() {
  var token, user;
  try {
    token = localStorage.getItem('ev_token');
    user  = token ? JSON.parse(localStorage.getItem('ev_user')) : null;
  } catch(e) {}
  if (!token || !user) window.location.replace('../../pages/auth/login.html');
  else if (user.role !== 'student') window.location.replace('../../pages/errors/403.html');
})();
</script>
