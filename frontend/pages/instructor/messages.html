  <style>
    .skel{background:var(--neutral-100);border-radius:4px;animation:shimmer 1.5s infinite;}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    @media(max-width:1023px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
    .stat-card{background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);padding:var(--space-5) var(--space-6);display:flex;align-items:flex-start;gap:var(--space-4);transition:all var(--transition-fast);}
    .stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
    .stat-icon-wrap{width:44px;height:44px;border-radius:var(--border-radius-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .si-blue{background:var(--color-primary-50);color:var(--color-primary-600);}
    .si-green{background:var(--color-success-light);color:var(--color-success);}
    .si-amber{background:var(--color-warning-light);color:var(--color-warning);}
    .si-purple{background:#ede9fe;color:#7c3aed;}
    .si-red{background:var(--color-danger-light);color:var(--color-danger);}
    .stat-value{font-size:var(--font-size-2xl);font-weight:800;color:var(--text-primary);line-height:1;margin-bottom:var(--space-1);}
    .stat-label{font-size:var(--font-size-xs);color:var(--text-muted);font-weight:500;}
    .dash-card{background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:var(--space-6);}
    .dash-card-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-color);}
    .dash-card-title{font-size:var(--font-size-base);font-weight:600;color:var(--text-primary);}
    .dash-card-body{padding:var(--space-5);}
    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--space-3);max-width:360px;}
    .toast{background:var(--bg-elevated);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--shadow-lg);padding:var(--space-4);display:flex;align-items:flex-start;gap:var(--space-3);}
    .toast-success{border-left:4px solid var(--color-success);}
    .toast-error{border-left:4px solid var(--color-danger);}
    .toast-info{border-left:4px solid var(--color-primary-600);}
    .toast-content{flex:1;}.toast-title{font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);}
    .toast-msg{font-size:var(--font-size-xs);color:var(--text-muted);margin-top:2px;}
    .toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;}
    .modal-overlay{display:none;position:fixed;inset:0;background:var(--bg-overlay);z-index:var(--z-modal);align-items:center;justify-content:center;padding:var(--space-4);}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg-elevated);border-radius:var(--border-radius-xl);box-shadow:var(--shadow-modal);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-5) var(--space-6);border-bottom:1px solid var(--border-color);}
    .modal-title{font-size:var(--font-size-lg);font-weight:600;color:var(--text-primary);}
    .modal-body{padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4);}
    .modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:var(--space-3);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-color);}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;}
    .badge-success{background:var(--color-success-light);color:var(--color-success-dark);}
    .badge-warning{background:var(--color-warning-light);color:var(--color-warning-dark);}
    .badge-danger{background:var(--color-danger-light);color:var(--color-danger-dark);}
    .badge-primary{background:var(--color-primary-50);color:var(--color-primary-700);}
    .badge-neutral{background:var(--neutral-100);color:var(--text-muted);}
    .form-group{margin-bottom:var(--space-4);}
    .form-label{display:block;font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);margin-bottom:var(--space-2);}
    .form-input,.form-select{width:100%;height:42px;padding:0 var(--space-4);border:1px solid var(--border-color);border-radius:var(--border-radius-md);font-size:var(--font-size-sm);color:var(--text-primary);background:var(--bg-surface);font-family:var(--font-ui);outline:none;transition:border-color var(--transition-fast);}
    .form-input:focus,.form-select:focus{border-color:var(--color-primary-600);}
    .form-textarea{width:100%;padding:var(--space-3) var(--space-4);border:1px solid var(--border-color);border-radius:var(--border-radius-md);font-size:var(--font-size-sm);color:var(--text-primary);background:var(--bg-surface);font-family:var(--font-ui);outline:none;resize:vertical;min-height:100px;transition:border-color var(--transition-fast);}
    .form-textarea:focus{border-color:var(--color-primary-600);}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{font-size:var(--font-size-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);padding:var(--space-3) var(--space-4);background:var(--bg-sunken);text-align:left;border-bottom:1px solid var(--border-color);white-space:nowrap;}
    td{padding:var(--space-3) var(--space-4);font-size:var(--font-size-sm);color:var(--text-primary);border-bottom:1px solid var(--border-color);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--neutral-50);}
    .page-tabs{display:flex;gap:0;border-bottom:2px solid var(--border-color);margin-bottom:var(--space-6);}
    .page-tab{padding:var(--space-3) var(--space-5);font-size:var(--font-size-sm);font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-ui);transition:all var(--transition-fast);}
    .page-tab:hover{color:var(--text-primary);}
    .page-tab.active{color:var(--color-primary-600);border-bottom-color:var(--color-primary-600);font-weight:600;}
    .tab-panel{display:none;}.tab-panel.active{display:block;}
    .empty-state{text-align:center;padding:var(--space-16);color:var(--text-muted);}
    .empty-state-icon{font-size:3rem;margin-bottom:var(--space-4);}
    .empty-state-title{font-size:var(--font-size-lg);font-weight:700;color:var(--text-primary);margin-bottom:var(--space-2);}
    .avatar-ring{width:40px;height:40px;border-radius:50%;background:var(--color-primary-100);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--font-size-sm);color:var(--color-primary-700);flex-shrink:0;}
    
  </style>

<style>
  .messages-layout{display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100vh - var(--navbar-height) - var(--space-12));background:var(--bg-surface);border:var(--card-border);border-radius:var(--card-radius);box-shadow:var(--card-shadow);overflow:hidden;}
  .rooms-panel{border-right:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden;}
  .rooms-header{padding:var(--space-4);border-bottom:1px solid var(--border-color);font-size:var(--font-size-base);font-weight:700;color:var(--text-primary);}
  .rooms-search{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-color);}
  .rooms-search input{width:100%;height:34px;padding:0 var(--space-3) 0 var(--space-8);border:1px solid var(--border-color);border-radius:var(--border-radius-md);font-size:var(--font-size-sm);background:var(--bg-sunken);outline:none;font-family:var(--font-ui);}
  .rooms-list{flex:1;overflow-y:auto;}
  .room-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);cursor:pointer;transition:background var(--transition-fast);border-bottom:1px solid var(--border-color);}
  .room-item:hover,.room-item.active{background:var(--color-primary-50);}
  .room-avatar{width:42px;height:42px;border-radius:50%;background:var(--color-primary-100);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--font-size-sm);color:var(--color-primary-700);flex-shrink:0;}
  .room-info{flex:1;min-width:0;}
  .room-name{font-size:var(--font-size-sm);font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .room-last{font-size:var(--font-size-xs);color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .room-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
  .room-time{font-size:10px;color:var(--text-disabled);}
  .room-badge{background:var(--color-primary-600);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:1px 5px;}
  .chat-panel{display:flex;flex-direction:column;overflow:hidden;}
  .chat-header{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:var(--space-3);flex-shrink:0;}
  .chat-messages{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3);}
  .msg-bubble{max-width:70%;padding:var(--space-3) var(--space-4);border-radius:var(--border-radius-xl);font-size:var(--font-size-sm);line-height:var(--leading-relaxed);}
  .msg-sent{background:var(--color-primary-600);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
  .msg-recv{background:var(--bg-sunken);color:var(--text-primary);align-self:flex-start;border-bottom-left-radius:4px;}
  .msg-time{font-size:10px;color:var(--text-disabled);margin-top:2px;text-align:right;}
  .msg-recv .msg-time{text-align:left;}
  .chat-input-bar{padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-color);display:flex;align-items:center;gap:var(--space-3);flex-shrink:0;}
  .chat-input{flex:1;height:42px;padding:0 var(--space-4);border:1px solid var(--border-color);border-radius:var(--border-radius-full);font-size:var(--font-size-sm);background:var(--bg-sunken);outline:none;font-family:var(--font-ui);}

  @media(max-width:767px){.messages-layout{grid-template-columns:1fr;}.chat-panel{display:none;}.chat-panel.mobile-open{display:flex;}}

<script>
(function(){var t,u;try{t=localStorage.getItem('ev_token');u=t?JSON.parse(localStorage.getItem('ev_user')):null;}catch(e){}
if(!t||!u){window.location.replace('../../pages/auth/login.html');return;}
if(u.role!=='instructor'){window.location.replace('../../pages/errors/403.html');}})();
document.addEventListener('DOMContentLoaded',function(){
if(typeof feather!=='undefined')feather.replace({'stroke-width':1.75});
var user;try{user=JSON.parse(localStorage.getItem('ev_user'))||{};}catch(e){user={};}
var name=user.name||'';
var initials=name.trim().split(/\s+/).reduce(function(a,p,i,arr){return i===0||i===arr.length-1?a+p[0].toUpperCase():a;},'');
['sidebar-user-name','navbar-user-name','dd-user-name'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=name;});
['sidebar-avatar','navbar-avatar'].forEach(function(id){var el=document.getElementById(id);if(!el)return;if(user.avatar){el.innerHTML='<img src="'+user.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>';}else{el.textContent=initials;}});
var shell=document.getElementById('app-shell');
document.getElementById('navbar-menu-btn').addEventListener('click',function(){shell.classList.toggle('sidebar-open');});
document.getElementById('sidebar-overlay').addEventListener('click',function(){shell.classList.remove('sidebar-open');});
var colBtn=document.getElementById('sidebar-collapse-btn');
if(colBtn)colBtn.addEventListener('click',function(){var c=shell.classList.toggle('sidebar-collapsed');try{localStorage.setItem('ev_sidebar_collapsed',String(c));}catch(e){}});
try{if(localStorage.getItem('ev_sidebar_collapsed')==='true')shell.classList.add('sidebar-collapsed');else shell.classList.remove('sidebar-collapsed');}catch(e){}
document.querySelectorAll('[data-action="toggle-theme"]').forEach(function(btn){btn.addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');document.documentElement.setAttribute('data-theme',d?'dark':'light');try{localStorage.setItem('ev_theme',d?'dark':'light');}catch(e){}});});
var trigger=document.getElementById('navbar-user-trigger'),dropdown=document.getElementById('user-dropdown');
if(trigger&&dropdown){trigger.addEventListener('click',function(e){e.stopPropagation();dropdown.hidden=!dropdown.hidden;});document.addEventListener('click',function(){if(dropdown)dropdown.hidden=true;});}
document.querySelectorAll('[data-action="logout"]').forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();try{localStorage.removeItem('ev_token');localStorage.removeItem('ev_user');localStorage.removeItem('ev_refresh_token');}catch(e){}window.location.replace('../../pages/auth/login.html');});});
function _esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(type,title,msg){var c=document.getElementById('toast-container');if(!c)return;var el=document.createElement('div');el.className='toast toast-'+type;el.innerHTML='<div class="toast-content"><div class="toast-title">'+_esc(title)+'</div>'+(msg?'<div class="toast-msg">'+_esc(msg)+'</div>':'')+' </div><button class="toast-close" onclick="this.closest(\'.toast\').remove()">&#x2715;</button>';c.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},4000);}
window._esc=_esc;window.showToast=showToast;
function openModal(id){document.getElementById(id).classList.add('open');if(typeof feather!=='undefined')feather.replace({'stroke-width':1.75});}
function closeModal(id){document.getElementById(id).classList.remove('open');}
window.openModal=openModal;window.closeModal=closeModal;

var allRooms=[],activeRoomId=null,userId=(function(){try{var u=JSON.parse(localStorage.getItem('ev_user'));return u?u.id:null;}catch(e){return null;}})();
async function loadRooms(){
  try{var res=await Api.get('/instructor/messages/rooms');allRooms=(res&&res.data)||[];renderRooms(allRooms);}
  catch(e){document.getElementById('rooms-list').innerHTML='<div style="padding:var(--space-4);color:var(--text-muted);font-size:var(--font-size-sm);">Failed to load.</div>';}
}
function renderRooms(rooms){
  var list=document.getElementById('rooms-list');
  if(!rooms.length){list.innerHTML='<div style="padding:var(--space-6);text-align:center;color:var(--text-muted);font-size:var(--font-size-sm);">No conversations yet.</div>';return;}
  list.innerHTML=rooms.map(function(r){
    var on=r.other_user_name||r.name||'Student';
    var ini=on.trim().split(/\s+/).reduce(function(a,p,i,arr){return i===0||i===arr.length-1?a+p[0].toUpperCase():a;},'');
    var last=r.last_message?_esc(r.last_message.content||''):'No messages';
    var t=r.last_message&&r.last_message.created_at?timeAgo(new Date(r.last_message.created_at)):'';
    var unread=r.unread_count||0;
    return '<div class="room-item'+(r.id===activeRoomId?' active':'')+'" data-rid="'+r.id+'" onclick="openRoom('+r.id+')">'+
      '<div class="room-avatar">'+ini+'</div>'+
      '<div class="room-info"><div class="room-name">'+_esc(on)+'</div><div class="room-last">'+last+'</div></div>'+
      '<div class="room-meta"><div class="room-time">'+t+'</div>'+(unread?'<div class="room-badge">'+unread+'</div>':'')+' </div>'+
    '</div>';
  }).join('');
}
function timeAgo(d){var diff=Math.floor((new Date()-d)/1000);if(diff<60)return 'now';if(diff<3600)return Math.floor(diff/60)+'m';if(diff<86400)return Math.floor(diff/3600)+'h';return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
window.openRoom=async function(roomId){
  activeRoomId=roomId;
  document.querySelectorAll('.room-item').forEach(function(el){el.classList.toggle('active',el.dataset.rid==roomId);});
  var room=allRooms.find(function(r){return r.id==roomId;});
  var on=room?(room.other_user_name||room.name||'Student'):'Chat';
  var ini=on.trim().split(/\s+/).reduce(function(a,p,i,arr){return i===0||i===arr.length-1?a+p[0].toUpperCase():a;},'');
  document.getElementById('chat-empty').style.display='none';
  var active=document.getElementById('chat-active');active.style.display='flex';
  document.getElementById('chat-header').innerHTML='<div style="width:38px;height:38px;border-radius:50%;background:var(--color-primary-100);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--font-size-sm);color:var(--color-primary-700);">'+ini+'</div><div><div style="font-size:var(--font-size-base);font-weight:600;color:var(--text-primary);">'+_esc(on)+'</div><div style="font-size:var(--font-size-xs);color:var(--text-muted);">Student</div></div>';
  document.getElementById('chat-messages').innerHTML='<div class="skel" style="height:40px;width:60%;border-radius:12px;"></div>';
  try{
    var res=await Api.get('/instructor/messages/'+roomId);
    var msgs=(res&&res.data&&res.data.messages)||(res&&res.data)||[];
    renderMessages(msgs);
    try{await Api.post('/instructor/messages/'+roomId+'/read');}catch(e){}
    loadRooms();
  }catch(e){document.getElementById('chat-messages').innerHTML='<div style="color:var(--color-danger);">Failed to load.</div>';}
};
function renderMessages(msgs){
  var c=document.getElementById('chat-messages');
  if(!msgs.length){c.innerHTML='<div style="text-align:center;color:var(--text-muted);font-size:var(--font-size-sm);padding:var(--space-8);">No messages yet.</div>';return;}
  c.innerHTML=msgs.map(function(m){var mine=m.sender_id==userId||m.is_mine;return '<div style="display:flex;flex-direction:column;align-items:'+(mine?'flex-end':'flex-start')+'"><div class="msg-bubble '+(mine?'msg-sent':'msg-recv')+'">'+_esc(m.content||'')+'</div><div class="msg-time">'+timeAgo(new Date(m.created_at))+'</div></div>';}).join('');
  c.scrollTop=c.scrollHeight;
}
async function sendMessage(){
  var input=document.getElementById('chat-input');var text=input.value.trim();
  if(!text||!activeRoomId)return;input.value='';
  try{await Api.post('/instructor/messages/'+activeRoomId,{content:text});var res=await Api.get('/instructor/messages/'+activeRoomId);renderMessages((res&&res.data&&res.data.messages)||(res&&res.data)||[]);}
  catch(e){input.value=text;}
}
document.getElementById('send-btn').addEventListener('click',sendMessage);
document.getElementById('chat-input').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
var sd;document.getElementById('room-search').addEventListener('input',function(){clearTimeout(sd);var q=this.value.toLowerCase();sd=setTimeout(function(){renderRooms(allRooms.filter(function(r){return(r.other_user_name||r.name||'').toLowerCase().includes(q);}));},200);});
loadRooms();
});
</script>
<div class="toast-container" id="toast-container"></div>
</body></html>
